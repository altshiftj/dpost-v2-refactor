stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

# ──────────────────────────────────────────────
# TEST STAGE
# ──────────────────────────────────────────────
test:
  stage: test
  image: python:3.12
  before_script:
    - pip install -e .[dev]
  script:
    - pytest -v --tb=short tests/

# ──────────────────────────────────────────────
# BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - echo "DEVICE_NAME=SEM_TischREM_BLB" > .env  # or inject from GitLab CI var
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week

# ──────────────────────────────────────────────
# DEPLOY STAGE – TischREM App
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache samba-client
  script:
    - echo "Deploying to $TARGET_USER@$TARGET_IP"
    - smbclient "//$TARGET_IP/C$/Watchdog" -U "$TARGET_USER%$TARGET_PASS" -c "put dist/run.exe"
  environment:
    name: prod-tischrem
    url: http://$TARGET_IP:8001/health
  only:
    - tags
  tags:
    - docker-alpine
