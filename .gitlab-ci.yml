stages:
  - build
  - deploy

build:
  stage: build
  # (image: field removed – Shell executor ignores it anyway)

  before_script:
    # 1️⃣  Locate real CPython (adjust path if yours differs)
    - $pythonExe = 'C:\Python\Python312\python.exe'
    - |
      if (-Not (Test-Path $pythonExe)) {
        Write-Error "❌  $pythonExe not found.  Install real CPython and adjust the path in .gitlab-ci.yml."
        exit 1
      }
      Write-Host "✅  Using $pythonExe"

    # 2️⃣  Create & activate isolated env
    - & $pythonExe -m venv .build-venv
    - .\.build-venv\Scripts\activate

    # 3️⃣  Install only the packages we care about
    - pip install -r requirements.txt
    - pip install pyinstaller python-dotenv

    # 4️⃣  Pass DEVICE_NAME into the build context
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - Copy-Item -Force .env build/.env

  script:
    - pyinstaller build/run.spec          # now uses clean venv

  artifacts:
    paths: [dist/run.exe]
    expire_in: 1 week
  tags: [local]

deploy-tischrem:
  stage: deploy
  needs: [build]
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"

    if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    if (!(Test-Path "dist\run.exe")) { Write-Error "dist/run.exe missing"; exit 1 }

    pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
             ".\dist\run.exe" "${user}@${ip}:/d:/WatchdogDeploy/run.exe"
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
