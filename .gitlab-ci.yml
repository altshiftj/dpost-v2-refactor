stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags:
    - local

# ──────────────────────────────────────────────
# 🚀 DEPLOY STAGE – TISCHREM (SECURE PSDrive)
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS

    # Do a one-time trust step (non-batch mode, no file actually needed)
    Write-Host "⏳ Accepting host key for $ip..."
    echo y | pscp.exe -pw "$pass" -ls "$user@$ip:/"

    Write-Host "⏳ Pre-accepting host key if needed…"
    echo y | pscp.exe -pw "$pass" -batch -ls "${user}@${ip}:/d:/"

    Write-Host "🚀 Copying run.exe to $ip via SCP…"
    echo y | pscp.exe -pw "$pass" dist\run.exe "${user}@${ip}:/d:/WatchdogDeploy/run.exe"

    Write-Host "📦 Copying .env…"
    "DEVICE_NAME=SEM_TischREM_BLB" | Out-File -Encoding ascii .env
    pscp.exe -pw "$pass" .env "${user}@${ip}:/d:/WatchdogDeploy/.env"

  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health

