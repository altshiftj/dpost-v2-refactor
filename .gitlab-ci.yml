# ────────────────  CI/CD PIPELINE FOR IPAT-WATCHDOG  ────────────────
# build  ➜  deploy  ➜  run (Scheduled Task)  ➜  health
# -------------------------------------------------------------------
stages:
  - build
  - deploy
  - run
  - health

# 🛠️ Cache pip downloads between builds
cache:
  paths:
    - .cache/pip

# ─────────────── 🔨 BUILD ───────────────
build:
  stage: build
  rules:
    - changes: ["requirements.txt", "build/run.spec", "src/**/*"]
      when: on_success
    - when: never
  before_script:
    - $pythonExe = 'C:\Python\Python312\python.exe'
    - |
      if (-Not (Test-Path $pythonExe)) {
        Write-Error "❌  $pythonExe not found. Install CPython and update .gitlab-ci.yml."
        exit 1
      }
      Write-Host "✅  Using $pythonExe"
    - "& $pythonExe -m venv .build-venv"
    - .\.build-venv\Scripts\activate
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pyinstaller python-dotenv
    - "echo DEVICE_NAME=$env:DEVICE_NAME > .env"
    - Copy-Item -Force .env build/.env

  script:
    - cmd /c "set PYTHONPATH=%CD%\\src && .build-venv\\Scripts\\pyinstaller.exe build\\run.spec"

  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags: [local]

# ─────────────── 🚀 DEPLOY ───────────────
deploy-tischrem:
  stage: deploy
  needs: [build]
  rules:
    - if: '$CI_COMMIT_TAG'
      changes:
        - dist/run.exe
        - .gitlab-ci.yml
      when: on_success
    - when: never
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"

    if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    if (!(Test-Path "dist\run.exe")) {
      Write-Error "❌ dist/run.exe missing"
      exit 1
    }

    # 🛑 Step 1: Stop the running app before overwriting
    plink.exe -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -NoProfile -ExecutionPolicy Bypass -Command `
        try {
          if (Get-ScheduledTask -TaskName 'IPAT-Watchdog' -ErrorAction SilentlyContinue) {
            Stop-ScheduledTask -TaskName 'IPAT-Watchdog' -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
          }
          Get-Process run -ErrorAction SilentlyContinue | Stop-Process -Force
        } catch {
          Write-Host '⚠️ Could not fully stop old watchdog app.'
        }
      "

    # 🚚 Step 2: Now safe to copy the new binary
    pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
             ".\dist\run.exe" "${user}@${ip}:/d:/WatchdogDeploy/run.exe"

    pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
             ".\infra\windows\register_task.ps1" "${user}@${ip}:/d:/WatchdogDeploy/register_task.ps1"
  tags: [local]
  environment:
    name: prod-tischrem
    url:  http://$env:TARGET_IP:8001/health

# ─────────────── ▶️ RUN ───────────────
run-prod:
  stage: run
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"

    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    # 1) register / update the scheduled task
    plink.exe -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -NoProfile -ExecutionPolicy Bypass -File D:\WatchdogDeploy\register_task.ps1"

    # 2) start it immediately
    plink.exe -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -NoProfile -Command Start-ScheduledTask -TaskName 'IPAT-Watchdog'"
  environment:
    name: prod-tischrem
    action: start
  tags: [local]


# ─────────────── ❤️ HEALTH ───────────────
health-check:
  stage: health
  needs: [run-prod]
  allow_failure: false
  script: |
    $url = "http://$($env:TARGET_IP):8001/health"   # ← fixed
    Write-Host "⏱️  Waiting for $url …"
    for ($i=0; $i -lt 30; $i++) {
      try {
        Invoke-RestMethod -Uri $url -TimeoutSec 3
        Write-Host "✅  Service is healthy"; exit 0
      } catch {
        Start-Sleep -Seconds 2
      }
    }
    Write-Error "❌ Service did not become healthy in time"; exit 1
  environment: prod-tischrem
  tags: [local]

