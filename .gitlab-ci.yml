stages:
  - build
  - deploy

# ─────────────── 🔨 BUILD ───────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec          # creates dist\run.exe
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags: [local]

# ─────────────── 🚀 DEPLOY ───────────────
deploy-tischrem:
  stage: deploy
  needs: [build]
  script: |
    $ErrorActionPreference = 'Stop'

    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $keyPath = "$HOME\deploy_key"

    Write-Host "`n🔐 Writing deploy SSH key to $keyPath"
    $env:DEPLOY_SSH_KEY | Out-File -Encoding ascii $keyPath

    Write-Host "🔒 Restricting permissions on key file"
    icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)"

    Write-Host "🔑 Adding $ip to known_hosts (TOFU)"
    if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    if (!(Test-Path "dist\run.exe")) {
      throw "❌ dist\run.exe is missing — build artifact not found!"
    }

    Write-Host "🚀 Copying run.exe to $ip"
    scp -i $keyPath -o StrictHostKeyChecking=accept-new `
        ".\dist\run.exe" "${user}@${ip}:d:/WatchdogDeploy/run.exe"
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
