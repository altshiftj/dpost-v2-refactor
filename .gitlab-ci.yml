stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags:
    - local

# ──────────────────────────────────────────────
# 🚀 DEPLOY STAGE – TISCHREM (SECURE PSDrive)
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS

    echo "Deploying run.exe to \\$ip\WatchdogDeploy using temporary PSDrive..."

    # Mount network share as Z: using provided credentials
    New-PSDrive -Name Z -PSProvider FileSystem `
      -Root "\\$ip\WatchdogDeploy" `
      -Persist:$false `
      -Credential (New-Object pscredential `
                     $user `
                     (ConvertTo-SecureString $pass -AsPlainText -Force))

    # Deploy the executable
    Copy-Item "dist\run.exe" "Z:\run.exe" -Force

    # Clean up the mapped drive
    Remove-PSDrive Z
  when: manual
  only:
    - tags
  tags:
    - local
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
