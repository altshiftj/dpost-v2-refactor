stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - echo "DEVICE_NAME=$DEVICE_NAME" > .env
    - mkdir -p build
    - cp .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    name: "run-$CI_COMMIT_REF_NAME"
    expire_in: 1 week
  tags:
    - local  # Optional: restrict to local runner if desired

# ──────────────────────────────────────────────
# 🚀 DEPLOY STAGE
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache samba-client
  script:
    - echo "Deploying run.exe to //$TARGET_IP/WatchdogDeploy"
    - smbclient "//$TARGET_IP/WatchdogDeploy" -U "$TARGET_USER%$TARGET_PASS" -c "put dist/run.exe"
  only:
    - tags
  tags:
    - local  # Must match the tags from your registered runner
  environment:
    name: prod-tischrem
    url: http://$TARGET_IP:8001/health
