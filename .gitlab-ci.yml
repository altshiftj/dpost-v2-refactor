stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:                       # ▼ keep the raw file, no ZIP
      - dist/run.exe             #   GitLab will unpack this as dist/run.exe
    expire_in: 1 week
  tags:                          # runs only on your local runner
    - local

# ──────────────────────────────────────────────
# 🚀 DEPLOY – TischREM
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  needs:                         # ▼ pulls artifacts from the *build* job
    - job: build
      artifacts: true
  script: |
    echo "Deploying run.exe to \\$env:TARGET_IP\WatchdogDeploy"
    $targetPath = "\\$env:TARGET_IP\WatchdogDeploy\run.exe"
    Copy-Item "dist\run.exe" $targetPath -Force
  when: manual                   # (optional) click ▶ in GitLab to deploy
  only:
    - tags                       # runs on tag pipelines
  tags:
    - local
  environment:
    name: prod-tischrem
    url:  http://$env:TARGET_IP:8001/health
