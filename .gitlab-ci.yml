# ────────────────────────────────────────────────────────────────
#  GLOBALS
# ────────────────────────────────────────────────────────────────
stages: [test, build, sign, deploy, run, health, rollback]   # <‑‑ added “test”


variables:
  PY_VER:        "3.12"
  PIP_CACHE_DIR: ".cache/pip"
cache: { paths: [.cache/pip] }

.default_template: &default_template
  tags: [worktop]
  image: mcr.microsoft.com/powershell:lts-nanoserver-2022

before_script: &before_script_common
  - pwsh scripts/infra/windows/gen_env.ps1 -DeviceSlug $env:DEVICE_SLUG
  - pip install -e .[dev,$env:DEVICE_SLUG]
  - Copy-Item device.env build/.env

# ────────────────────────────────────────────────────────────────
#  TEST  (pytest)
# ────────────────────────────────────────────────────────────────
.test_template: &test_template
  stage: test
  tags: [worktop]
  before_script:
    - *before_script_common
    # install app in editable mode with the extra “ci” deps (= pytest, pyfakefs, …)
    - pip install -e .[ci,$env:DEVICE_SLUG]
  script:
    - pytest -q          # run all tests quietly; drop -q if you prefer full output
  artifacts:
    when: always         # keep reports even on failure
    paths: [ .pytest_cache, tests/__pycache__ ]

.test_jobs:
  <<: *test_template
  parallel:
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"
      
# ────────────────────────────────────────────────────────────────
#  BUILD
# ────────────────────────────────────────────────────────────────
.build_template: &build_template
  <<: *default_template
  stage: build
  before_script:
    - *before_script_common
    - pip install -e .[build,$env:DEVICE_SLUG]
    - echo "$env:CI_COMMIT_TAG" > version.txt
    - Copy-Item version.txt build/version.txt
    - Copy-Item device.env build/.env
  script: |
    pyinstaller "build/specs/${DEVICE_SLUG}.spec" --clean --noconfirm
  artifacts:
    paths: 
      - "dist/wd_${DEVICE_SLUG}.exe"
      - version.txt]
    expire_in: 1 week
  rules:
    - changes:
        - "pyproject.toml"
        - "build/specs/${DEVICE_SLUG}.spec"
        - "src/ipat_watchdog/plugins/${DEVICE_SLUG}/**/*"
      when: always

.build_jobs:
  <<: *build_template
  parallel:
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"

# ────────────────────────────────────────────────────────────────
#  SIGN
# ────────────────────────────────────────────────────────────────
.sign_template: &sign_template
  <<: *default_template
  stage: sign
  needs: ["build_${DEVICE_SLUG}"]
  before_script:
    - *before_script_common
  script: |
    $signtool = "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\x64\\signtool.exe"
    & "$signtool" sign /f "$env:SIGNING_CERT_PFX" /p "$env:SIGNING_CERT_PASS" `
      /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\wd_${DEVICE_SLUG}.exe"
  artifacts: 
    - paths:
      - dist/wd_${DEVICE_SLUG}.exe

.sign_jobs:
  <<: *sign_template
  parallel:
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"

# ────────────────────────────────────────────────────────────────
#  DEPLOY
# ────────────────────────────────────────────────────────────────
.deploy_template: &deploy_template
  <<: .windows_ssh_job_template
  stage: deploy
  needs: ["sign_${DEVICE_SLUG}"]
  environment:
    name: prod-${DEVICE_SLUG}
    url: http://$TARGET_IP:8001/health
  script: |
    . scripts/infra/windows/ci_context.ps1

    ssh-keyscan -p $port -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"
    plink.exe -P $port -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -Command `
        if (Test-Path '$exe') { Copy-Item '$exe' '${exe}_backup' -Force }"
    pscp.exe -P $port -batch -pw "$pass" -hostkey "$fpr" "dist\\$(Split-Path $exe -Leaf)" "$user@$ip:$exe"
    pscp.exe -P $port -batch -pw "$pass" -hostkey "$fpr" "version.txt" "$user@$ip:C:\\Watchdog\\version.txt"

.deploy_jobs:
  <<: *deploy_template
  parallel: 
    matrix: 
      - DEVICE_SLUG: "sem_tischrem_blb"

# ────────────────────────────────────────────────────────────────
#  RUN
# ────────────────────────────────────────────────────────────────
.run_template: &run_template
  <<: .windows_ssh_job_template
  stage: run
  needs: ["deploy_${DEVICE_SLUG}"]
  environment: 
    name: prod-${DEVICE_SLUG}, 
    action: start
  script: |
    . scripts/infra/windows/ci_context.ps1
    Register-WatchdogTask
  resource_group: "run-${DEVICE_SLUG}"

.run_jobs:
  <<: *run_template
  parallel: 
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"

# ────────────────────────────────────────────────────────────────
#  HEALTH
# ────────────────────────────────────────────────────────────────
.health_template: &health_template
  <<: *default_template
  stage: health
  needs: ["run_${DEVICE_SLUG}"]
  allow_failure: true
  script: |
    $url="http://$env:TARGET_IP:8001/health"
    for ($i=0; $i -lt 30; $i++) {
      try {
        Invoke-RestMethod -Uri $url
        exit 0
      } catch {
        Start-Sleep -Seconds 2
      }
    }
    Write-Error "Service unhealthy"; exit 1
  environment: prod-${DEVICE_SLUG}

.health_jobs:
  <<: *health_template
  parallel:
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"

# ────────────────────────────────────────────────────────────────
#  ROLLBACK
# ────────────────────────────────────────────────────────────────
.rollback_template: &rollback_template
  <<: .windows_ssh_job_template
  stage: rollback
  when: on_failure
  needs: ["run_${DEVICE_SLUG}"]
  script: |
    . scripts/infra/windows/ci_context.ps1
    Restore-WatchdogBackup
  resource_group: "rollback-${DEVICE_SLUG}"

.rollback_jobs:
  <<: *rollback_template
  parallel:
    matrix:
      - DEVICE_SLUG: "sem_tischrem_blb"

run_tests:
  <<: *test_template
  variables:
    DEVICE_SLUG: "sem_tischrem_blb"
