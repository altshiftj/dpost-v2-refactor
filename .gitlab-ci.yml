stages:
  - build
  - deploy

# ─────────────────────────────────────────
# 🔨 BUILD
# ─────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    # create frozen executable
    - pip install pyinstaller python-dotenv
    # strip unused GUI libs to keep build small
    - pip uninstall -y PyQt5 PySide6
    # forward DEVICE_NAME from CI variable into .env
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags: [local]

# ─────────────────────────────────────────
# 🚀 DEPLOY  (TischREM)
# ─────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - |
      # PowerShell block -------------------------------------------------
      $ip   = $env:TARGET_IP
      $user = $env:TARGET_USER

      Write-Host "`n🔑  Adding $ip to known_hosts …"
      if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
      ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

      Write-Host "🚀 Copying run.exe …"
      scp -o StrictHostKeyChecking=accept-new `
          dist/run.exe  "$user@$ip:d:/WatchdogDeploy/run.exe"

      Write-Host "📦 Copying .env …"
      'DEVICE_NAME=SEM_TischREM_BLB' | Out-File -Encoding ascii .env
      scp -o StrictHostKeyChecking=accept-new `
          .env          "$user@$ip:d:/WatchdogDeploy/.env"
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
