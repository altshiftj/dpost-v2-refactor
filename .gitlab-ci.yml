stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path -Path "build")) { New-Item -ItemType Directory -Path "build" }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    name: "run-$CI_COMMIT_REF_NAME"
    expire_in: 1 week
  tags:
    - local

# ──────────────────────────────────────────────
# 🚀 DEPLOY STAGE – TISCHREM
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  script:
    - echo "Deploying run.exe to \\$env:TARGET_IP\WatchdogDeploy"
    - Copy-Item "dist\run.exe" "\\$env:TARGET_IP\WatchdogDeploy\run.exe" -Force
  only:
    - tags
  tags:
    - local
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
