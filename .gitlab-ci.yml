stages:
  - build
  - deploy

# ─────────────── 🔨 BUILD ───────────────
build:
  stage: build
  image: python:3.12
  before_script:
    # 0️⃣  Verify Python is real CPython, not Windows-Apps shim
    - |
      $pythonPath = (Get-Command python).Source
      if ($pythonPath -match "WindowsApps") {
        Write-Error "❌  'python' resolves to Windows-Store shim. Install real CPython and put it on PATH."
        exit 1
      }
      Write-Host "✅  Using Python at $pythonPath"

    # 1️⃣  Install build-time deps into global env (simple & quick)
    - pip install -r requirements.txt
    - pip install pyinstaller python-dotenv

    # 2️⃣  Package-inventory + sanity checks
    - Write-Host "`n📦  Full package list:" 
    - pip list --format=columns
    - |
      Write-Host "`n🔎  Extras outside allow-list:"
      pip list --format=freeze | sort > all_pkgs.txt
      Select-String -Path all_pkgs.txt -NotMatch '(kadi-apy|watchdog|prometheus_client|python-dotenv|xmltodict|tifffile|requests|rdflib|pywin32|pywin32-ctypes|Pint|PyYAML|pyinstaller)' || echo "none"
    - Write-Host "`n🩺  pip check:"
    - pip check

    # 3️⃣  Hand DEVICE_NAME to PyInstaller
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec            # produces dist\run.exe
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags: [local]

# ─────────────── 🚀 DEPLOY ───────────────
deploy-tischrem:
  stage: deploy
  needs: [build]
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"

    Write-Host "`n🔑  Adding $ip to known_hosts …"
    if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    if (!(Test-Path "dist\run.exe")) {
      Write-Error "❌  dist\run.exe is missing — build artifact not found!"
      exit 1
    }

    Write-Host "🚀  Copying run.exe …"
    pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
             ".\dist\run.exe" "${user}@${ip}:/d:/WatchdogDeploy/run.exe"
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
