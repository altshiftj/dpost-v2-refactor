stages:
  - build
  - deploy

# ──────────────────────────────────────────────
# 🔨 BUILD STAGE
# ──────────────────────────────────────────────
build:
  stage: build
  image: python:3.12
  before_script:
    - pip install pyinstaller python-dotenv
    - pip uninstall -y PyQt5 PySide6
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env
  script:
    - pyinstaller build/run.spec
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags:
    - local

# ──────────────────────────────────────────────
# 🚀 DEPLOY STAGE – TISCHREM (SECURE PSDrive)
# ──────────────────────────────────────────────
deploy-tischrem:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  before_script:
    - |
      if (-not (Test-Path ".\pscp.exe")) {
        Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/pscp.exe" -OutFile "pscp.exe"
      }
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS

    # Download pscp if it isn't in the repo yet
    if (-not (Test-Path ".\pscp.exe")) {
      Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/pscp.exe" -OutFile "pscp.exe"
    }

    Write-Host "Copying run.exe to $ip via SCP…"
    .\pscp.exe -pw "$pass" dist\run.exe "$user@$ip:D:/WatchdogDeploy/run.exe"

    Write-Host "Copying .env…"
    echo "DEVICE_NAME=SEM_TischREM_BLB" | Out-File -Encoding ascii .env
    .\pscp.exe -pw "$pass" .env "$user@$ip:/d/WatchdogDeploy/.env"

  when: manual
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
