stages:
  - build
  - deploy

# ─────────────── 🔨 BUILD ───────────────
build:
  stage: build
  image: python:3.12           # gives us a *known* CPython in PATH
  before_script:
    # 1️⃣   Make sure we are NOT picking up the Windows-Apps shim
    - |
      $realPython = (Get-Command python).Source
      if ($realPython -match "WindowsApps") {
        Write-Error "❌  'python' resolves to the Microsoft-Store shim. \
                     Install a real CPython and add it to PATH."
        exit 1
      }
      Write-Host "✅  Using Python at $realPython"

    # 2️⃣   Create isolated env inside the job dir
    - python -m venv .build-venv
    - .\.build-venv\Scripts\activate

    # 3️⃣   Install strict, minimal deps + build tools
    - pip install -r requirements.txt
    - pip install pyinstaller python-dotenv

    # 4️⃣   Hand the DEVICE_NAME into a tiny .env file bundled by PyInstaller
    - echo "DEVICE_NAME=$env:DEVICE_NAME" > .env
    - if (!(Test-Path build)) { New-Item build -ItemType Directory }
    - Copy-Item .env build/.env

    # (diagnostics – optional, but helpful if something goes wrong)
    - Write-Host "🛠  PyInstaller path: $(Get-Command pyinstaller).Source"
    - pip list --format=columns

  script:
    - pyinstaller build/run.spec            # produces dist/run.exe
  artifacts:
    paths:
      - dist/run.exe
    expire_in: 1 week
  tags: [local]

# ─────────────── 🚀 DEPLOY ───────────────
deploy-tischrem:
  stage: deploy
  needs: [build]
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"

    Write-Host "`n🔑  Adding $ip to known_hosts …"
    if (!(Test-Path "$HOME\.ssh")) { New-Item "$HOME\.ssh" -ItemType Directory | Out-Null }
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"

    if (!(Test-Path "dist\run.exe")) {
      Write-Error "❌  dist\run.exe is missing — build artifact not found!"
      exit 1
    }

    Write-Host "🚀  Copying run.exe …"
    pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
             ".\dist\run.exe" "${user}@${ip}:/d:/WatchdogDeploy/run.exe"
  only: [tags]
  tags: [local]
  environment:
    name: prod-tischrem
    url: http://$env:TARGET_IP:8001/health
