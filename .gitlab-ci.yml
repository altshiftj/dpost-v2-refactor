# ────────────────────────────────────────────────────────────────
#  GLOBALS
# ────────────────────────────────────────────────────────────────
stages: [build, sign, deploy, run, health, rollback]

variables:
  PY_VER:        "3.12"
  DEVICE_LIST:   "sem_tischrem_blb core"   # <── add more slugs here
  PIP_CACHE_DIR: ".cache/pip"
cache: { paths: [.cache/pip] }

# Helper ─ convert slug → device name used in code / extras
#   slug  : sem_tischrem_blb
#   DEVICE_NAME : SEM_TischREM_BLB
.before_script_common: &before_script_common |
  python -m venv .buildvenv
  .\.buildvenv\Scripts\activate
  pip install -U pip setuptools wheel

.slug_to_var: &slug_to_var |
  $deviceName = "${CI_JOB_NAME}".ToUpper().Replace("_", "-")
  $deviceName = $deviceName.Substring(0,3) + "_" + $deviceName.Substring(3)  # crude, adjust if needed
  echo "DEVICE_NAME=$deviceName" >> device.env

# ────────────────────────────────────────────────────────────────
#  BUILD  (PyInstaller)
# ────────────────────────────────────────────────────────────────
.build_template:
  stage: build
  before_script:
    - *before_script_common
    - *slug_to_var
    - pip install -e .[dev,$env:DEVICE_NAME]
    - echo "$env:CI_COMMIT_TAG" > version.txt
    - Copy-Item version.txt build/version.txt
    - Copy-Item device.env build/.env
  script: |
    pyinstaller "build/specs/${CI_JOB_NAME}.spec" --clean --noconfirm --copy-metadata ipat-watchdog
  artifacts:
    paths: [dist/wd_${CI_JOB_NAME}.exe, version.txt]
    expire_in: 1 week
  tags: [worktop]
  rules:
    - changes:
        - "pyproject.toml"
        - "build/specs/${CI_JOB_NAME}.spec"
        - "src/ipat_watchdog/plugins/${CI_JOB_NAME}/**/*"
      when: always

# one build‑job per slug
.build_jobs:
  <<: .build_template
  parallel:
    matrix:
      - CI_JOB_NAME: $DEVICE_LIST

# ────────────────────────────────────────────────────────────────
#  SIGN  (signtool)
# ────────────────────────────────────────────────────────────────
.sign_template:
  stage: sign
  needs: ["build_${CI_JOB_NAME}"]
  before_script:
    - *before_script_common
  script: |
    $signtool = "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\x64\\signtool.exe"
    & "$signtool" sign /f "$env:SIGNING_CERT_PFX" /p "$env:SIGNING_CERT_PASS" `
      /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\wd_${CI_JOB_NAME}.exe"
  artifacts: { paths: [dist/wd_${CI_JOB_NAME}.exe] }
  tags: [worktop]

.sign_jobs:
  <<: .sign_template
  parallel:
    matrix: [ { CI_JOB_NAME: $DEVICE_LIST } ]

# ────────────────────────────────────────────────────────────────
#  DEPLOY
# ────────────────────────────────────────────────────────────────
.deploy_template:
  stage: deploy
  needs: ["sign_${CI_JOB_NAME}"]
  script: |
    $ip   = $env:TARGET_IP
    $user = $env:TARGET_USER
    $pass = $env:TARGET_PASS
    $fpr  = "ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"
    $bin  = "wd_${CI_JOB_NAME}.exe"
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"
    pscp.exe -batch -pw "$pass" -hostkey "$fpr" "dist\\$bin" "$user@$ip:\\C:\\Watchdog\\$bin"
    pscp.exe -batch -pw "$pass" -hostkey "$fpr" "version.txt" "$user@$ip:\\C:\\Watchdog\\version.txt"
  environment: { name: prod-${CI_JOB_NAME}, url: http://$TARGET_IP:8001/health }
  tags: [worktop]

.deploy_jobs:
  <<: .deploy_template
  parallel: { matrix: [ { CI_JOB_NAME: $DEVICE_LIST } ] }

# ────────────────────────────────────────────────────────────────
#  RUN  (register + start task)
# ────────────────────────────────────────────────────────────────
.run_template:
  stage: run
  needs: ["deploy_${CI_JOB_NAME}"]
  script: |
    $ip=$env:TARGET_IP; $user=$env:TARGET_USER; $pass=$env:TARGET_PASS
    $fpr="ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"
    $task="IPAT-Watchdog-${CI_JOB_NAME}"
    $exe='C:\Watchdog\wd_${CI_JOB_NAME}.exe'
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"
    plink.exe -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -Command `
        \$a=New-ScheduledTaskAction -Execute '$exe'; `
        \$t=New-ScheduledTaskTrigger -AtStartup; `
        Register-ScheduledTask -TaskName '$task' -Action \$a -Trigger \$t -Force; `
        Start-ScheduledTask -TaskName '$task'"
  environment: { name: prod-${CI_JOB_NAME}, action: start }
  tags: [worktop]

.run_jobs:
  <<: .run_template
  parallel: { matrix: [ { CI_JOB_NAME: $DEVICE_LIST } ] }

# ────────────────────────────────────────────────────────────────
#  HEALTH
# ────────────────────────────────────────────────────────────────
.health_template:
  stage: health
  needs: ["run_${CI_JOB_NAME}"]
  script: |
    $url="http://$env:TARGET_IP:8001/health"
    for ($i=0; $i -lt 30; $i++){ try{Invoke-RestMethod -Uri $url; exit 0} catch{Start-Sleep 2} }
    Write-Error "Service unhealthy"; exit 1
  environment: prod-${CI_JOB_NAME}
  tags: [worktop]

.health_jobs:
  <<: .health_template
  parallel: { matrix: [ { CI_JOB_NAME: $DEVICE_LIST } ] }

# ────────────────────────────────────────────────────────────────
#  ROLLBACK
# ────────────────────────────────────────────────────────────────
.rollback_template:
  stage: rollback
  when: on_failure
  needs: ["health_${CI_JOB_NAME}"]
  script: |
    $ip=$env:TARGET_IP;$user=$env:TARGET_USER;$pass=$env:TARGET_PASS
    $fpr="ssh-ed25519 255 SHA256:xUgAlbUoJUxxDPICmiaeZSvGjcwvv4v+rQ9B7axh5TI"
    $task="IPAT-Watchdog-${CI_JOB_NAME}"
    $exe='C:\Watchdog\wd_${CI_JOB_NAME}.exe'
    ssh-keyscan -H $ip | Out-File -Append "$HOME\.ssh\known_hosts"
    plink.exe -batch -pw "$pass" -hostkey "$fpr" "$user@$ip" `
      "powershell -Command `
        Stop-ScheduledTask -TaskName '$task' -ErrorAction SilentlyContinue; `
        if(Test-Path '${exe}_backup'){ Copy-Item '${exe}_backup' '${exe}' -Force }; `
        Start-ScheduledTask -TaskName '$task'"
  tags: [worktop]

.rollback_jobs:
  <<: .rollback_template
  parallel: { matrix: [ { CI_JOB_NAME: $DEVICE_LIST } ] }
