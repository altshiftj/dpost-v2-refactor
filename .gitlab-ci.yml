# GitLab CI Pipeline for IPAT-Watchdog
# build ➜ deploy ➜ run ➜ health

stages:
  - build
  - deploy
  - run
  - health

variables:
  PYTHON_VERSION: "312"
  PYTHON_EXE: "C:\\Python\\Python${PYTHON_VERSION}\\python.exe"
  VENV_DIR: ".venv"
  BINARY_NAME: "run.exe"
  DEPLOY_DIR: "D:\\WatchdogDeploy"
  HOST_KEY_FPR: ""
  MONITOR_PORT: "8001"

  TARGET_IP: ""
  TARGET_USER: ""
  TARGET_PASS: ""
  DEVICE_NAME: "SEM_TischREM_BLB"

cache:
  paths:
    - .cache/pip

.ps-ssh-init: &ps_ssh_init |
  $ip   = $env:TARGET_IP
  $user = $env:TARGET_USER
  $pass = $env:TARGET_PASS
  $fpr  = $env:HOST_KEY_FPR
  if (!(Test-Path "$HOME\\.ssh")) { New-Item "$HOME\\.ssh" -ItemType Directory | Out-Null }
  ssh-keyscan -H $ip | Out-File -Append "$HOME\\.ssh\\known_hosts"

.ps-copy-dist: &ps_copy_dist |
  pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
           ".\\dist\\$env:BINARY_NAME" `
           "${user}@${ip}:${env:DEPLOY_DIR}\\${env:BINARY_NAME}"

.ps-copy-task-script: &ps_copy_task_script |
  pscp.exe -batch -pw "$pass" -hostkey "$fpr" `
           ".\\infra\\windows\\register_task.ps1" `
           "${user}@${ip}:${env:DEPLOY_DIR}\\register_task.ps1"

build:
  stage: build
  tags: [local]
  rules:
    - changes:
        - requirements.txt
        - build/run.spec
        - src/**/*
      when: on_success
  before_script:
    - $pythonExe = "$env:PYTHON_EXE"
    - |
      if (-Not (Test-Path $pythonExe)) {
        Write-Error "❌  $pythonExe not found. Install CPython or set PYTHON_EXE."
        exit 1
      }
      Write-Host "✅  Using $pythonExe"
    - "& $pythonExe -m venv $env:VENV_DIR"
    - ".\\$env:VENV_DIR\\Scripts\\activate"
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pyinstaller python-dotenv
    - "echo DEVICE_NAME=$env:DEVICE_NAME > .env"
    - Copy-Item -Force .env build/.env
  script:
    - cmd /c "set PYTHONPATH=%CD%\\src && .\\$env:VENV_DIR\\Scripts\\pyinstaller.exe build\\run.spec"
  artifacts:
    paths: [dist]
    expire_in: 1 week

deploy-lab:
  stage: deploy
  needs:
    - job: build
      optional: true
  tags: [local]
  when: manual
  environment:
    name: "lab/$TARGET_IP"
    action: prepare
    url: "http://$TARGET_IP:$MONITOR_PORT/health"
  rules:
    - if: '$TARGET_IP != ""'
  before_script:
    - *ps_ssh_init
  script:
    - *ps_copy_dist
    - *ps_copy_task_script

run-lab:
  stage: run
  needs:
    - job: deploy-lab
      optional: true
  when: manual
  tags: [local]
  environment:
    name: "lab/$TARGET_IP"
    action: start
  before_script:
    - *ps_ssh_init
  script: |
    plink.exe -batch -pw "$env:TARGET_PASS" -hostkey "$env:HOST_KEY_FPR" `
      "${env:TARGET_USER}@${env:TARGET_IP}" `
      "powershell -NoProfile -ExecutionPolicy Bypass -File ${env:DEPLOY_DIR}\\register_task.ps1"
    plink.exe -batch -pw "$env:TARGET_PASS" -hostkey "$env:HOST_KEY_FPR" `
      "${env:TARGET_USER}@${env:TARGET_IP}" `
      "powershell -NoProfile -Command Start-ScheduledTask -TaskName 'IPAT-Watchdog'"

health-check:
  stage: health
  needs:
    - job: run-lab
      optional: true
  allow_failure: false
  tags: [local]
  before_script: []
  script: |
    $url = "http://$env:TARGET_IP:$env:MONITOR_PORT/health"
    Write-Host "⏱️  Waiting for $url …"
    for ($i=0; $i -lt 30; $i++) {
      try {
        Invoke-RestMethod -Uri $url -TimeoutSec 3
        Write-Host "✅  Service is healthy"; exit 0
      } catch {
        Start-Sleep -Seconds 2
      }
    }
    Write-Error "❌ Service did not become healthy in time"; exit 1
  environment:
    name: "lab/$TARGET_IP"