name: Public CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:latest

  quality:
    name: quality (py${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: workflow-lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          # Keep Linux-safe by avoiding project extras that require Windows-only deps.
          python -m pip install black ruff --retries 5 --timeout 60
      - name: Lint and format checks
        run: |
          if [ ! -d "src/dpost_v2" ]; then
            echo "::error::Missing src/dpost_v2"
            exit 1
          fi

          targets=(src/dpost_v2)
          if [ -d "tests/dpost_v2" ]; then
            targets+=(tests/dpost_v2)
          fi

          python -m ruff check "${targets[@]}"
          python -m black --check "${targets[@]}"

  unit-tests:
    name: unit-tests (py${{ matrix.python-version }})
    runs-on: windows-2022
    needs: quality
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          python -m pip install ".[ci,dev]" --retries 5 --timeout 60
      - name: Unit test suite
        shell: pwsh
        run: |
          if (-not (Test-Path "tests/dpost_v2")) {
            Write-Error "Missing tests/dpost_v2"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $junitPath = "test-results/unit-tests-py${{ matrix.python-version }}.xml"
          python -m pytest -q -ra --junitxml $junitPath tests/dpost_v2
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-ci-unit-tests-py${{ matrix.python-version }}
          path: test-results/unit-tests-py${{ matrix.python-version }}.xml
          if-no-files-found: warn

  integration-tests:
    name: integration-tests (py3.12)
    runs-on: windows-2022
    needs: quality
    timeout-minutes: 45
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          python -m pip install ".[ci,dev]" --retries 5 --timeout 60
      - name: Integration test suite
        shell: pwsh
        run: |
          $targets = @(
            "tests/dpost_v2/application/ingestion/test_pipeline_integration.py",
            "tests/dpost_v2/plugins/test_device_integration.py",
            "tests/dpost_v2/smoke"
          )

          $existingTargets = $targets | Where-Object { Test-Path $_ }
          if ($existingTargets.Count -eq 0) {
            Write-Error "No integration targets found under tests/dpost_v2."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $junitPath = "test-results/integration-tests-py3.12.xml"
          python -m pytest -q -ra --junitxml $junitPath $existingTargets
      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-ci-integration-tests-py3.12
          path: test-results/integration-tests-py3.12.xml
          if-no-files-found: warn

  bootstrap-smoke:
    name: bootstrap-smoke
    runs-on: windows-2022
    needs: quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          python -m pip install ".[ci,dev]" --retries 5 --timeout 60
      - name: Run bootstrap smoke tests with deterministic environment
        env:
          DPOST_PC_NAME: tischrem_blb
          DPOST_DEVICE_PLUGINS: sem_phenomxl2
          PC_NAME: ""
          DEVICE_PLUGINS: ""
        shell: pwsh
        run: |
          $targets = @(
            "tests/dpost_v2/application/startup/test_bootstrap.py",
            "tests/dpost_v2/smoke/test_bootstrap_harness_smoke.py"
          )

          $existingTargets = $targets | Where-Object { Test-Path $_ }
          if ($existingTargets.Count -eq 0) {
            Write-Error "No bootstrap smoke targets found under tests/dpost_v2."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $junitPath = "test-results/bootstrap-smoke-py3.12.xml"
          python -m pytest -q -ra --junitxml $junitPath $existingTargets
      - name: Upload bootstrap smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-ci-bootstrap-smoke-py3.12
          path: test-results/bootstrap-smoke-py3.12.xml
          if-no-files-found: warn

  package-build:
    name: package-build
    runs-on: windows-2022
    needs: quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          python -m pip install build --retries 5 --timeout 60
      - name: Build sdist and wheel
        run: |
          python -m build
      - name: Upload package build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-ci-package-build
          path: dist/*
          if-no-files-found: warn

  hygiene:
    name: artifact-hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check workflow config and artifact hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".github/workflows" ]; then
            echo "::error::.github/workflows directory is missing"
            exit 1
          fi

          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if (( ${#workflow_files[@]} == 0 )); then
            echo "::error::No workflow files found under .github/workflows"
            exit 1
          fi

          tracked_artifacts="$(git ls-files -- .env build/.env)"
          if [ -n "$tracked_artifacts" ]; then
            echo "::error::Tracked environment artifacts found in git index:"
            echo "$tracked_artifacts"
            exit 1
          fi

          if [ ! -f ".env.example" ]; then
            echo "::error::Missing .env.example"
            exit 1
          fi

          if git check-ignore -v .github/workflows >/dev/null 2>&1; then
            echo "::error::.github/workflows is ignored by .gitignore"
            exit 1
          fi

          tracked_workflows="$(git ls-files -- .github/workflows)"
          if [ -z "$tracked_workflows" ]; then
            echo "::error::.github/workflows is not tracked in git index"
            exit 1
          fi
