name: Public CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.11

  quality:
    name: quality (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: workflow-lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          # Keep Linux-safe by avoiding project extras that require Windows-only deps.
          python -m pip install black ruff
      - name: Lint and format checks
        run: |
          python -m ruff check .
          python -m black --check src tests

  unit-tests:
    name: unit-tests (py${{ matrix.python-version }})
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Unit test suite
        run: |
          python -m pytest -q tests/unit

  integration-tests:
    name: integration-tests (py3.12)
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 45
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Integration test suite
        run: |
          python -m pytest -q tests/integration

  bootstrap-smoke:
    name: bootstrap-smoke
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Run bootstrap smoke tests with deterministic environment
        env:
          DPOST_PC_NAME: tischrem_blb
          DPOST_DEVICE_PLUGINS: sem_phenomxl2
          PC_NAME: ""
          DEVICE_PLUGINS: ""
        run: |
          python -m pytest -q tests/unit/runtime/test_bootstrap.py tests/unit/runtime/test_bootstrap_additional.py

  package-build:
    name: package-build
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build sdist and wheel
        run: |
          python -m build

  hygiene:
    name: artifact-hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check workflow config and artifact hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".github/workflows" ]; then
            echo "::error::.github/workflows directory is missing"
            exit 1
          fi

          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if (( ${#workflow_files[@]} == 0 )); then
            echo "::error::No workflow files found under .github/workflows"
            exit 1
          fi

          tracked_artifacts="$(git ls-files -- .env build/.env)"
          if [ -n "$tracked_artifacts" ]; then
            echo "::error::Tracked environment artifacts found in git index:"
            echo "$tracked_artifacts"
            exit 1
          fi

          if [ ! -f ".env.example" ]; then
            echo "::error::Missing .env.example"
            exit 1
          fi

          if git check-ignore -v .github/workflows >/dev/null 2>&1; then
            echo "::error::.github/workflows is ignored by .gitignore"
            exit 1
          fi

          tracked_workflows="$(git ls-files -- .github/workflows)"
          if [ -z "$tracked_workflows" ]; then
            echo "::error::.github/workflows is not tracked in git index"
            exit 1
          fi
