name: Public CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Lint and format checks
        run: |
          python -m ruff check .
          python -m black --check src tests

  tests:
    name: tests
    runs-on: windows-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Full test suite
        run: |
          python -m pytest -q

  bootstrap-smoke:
    name: bootstrap-smoke
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Run bootstrap smoke tests with deterministic environment
        env:
          DPOST_PC_NAME: tischrem_blb
          DPOST_DEVICE_PLUGINS: sem_phenomxl2
          PC_NAME: ""
          DEVICE_PLUGINS: ""
        run: |
          python -m pytest -q tests/unit/runtime/test_bootstrap.py tests/unit/runtime/test_bootstrap_additional.py

  package-build:
    name: package-build
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build sdist and wheel
        run: |
          python -m build

  hygiene:
    name: artifact-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check workflow config and artifact hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".github/workflows" ]; then
            echo "::error::.github/workflows directory is missing"
            exit 1
          fi

          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if (( ${#workflow_files[@]} == 0 )); then
            echo "::error::No workflow files found under .github/workflows"
            exit 1
          fi

          tracked_artifacts="$(git ls-files -- .env build/.env)"
          if [ -n "$tracked_artifacts" ]; then
            echo "::error::Tracked environment artifacts found in git index:"
            echo "$tracked_artifacts"
            exit 1
          fi

          if [ ! -f ".env.example" ]; then
            echo "::error::Missing .env.example"
            exit 1
          fi

          if git check-ignore -v .github/workflows >/dev/null 2>&1; then
            echo "::error::.github/workflows is ignored by .gitignore"
            exit 1
          fi

          tracked_workflows="$(git ls-files -- .github/workflows)"
          if [ -z "$tracked_workflows" ]; then
            echo "::error::.github/workflows is not tracked in git index"
            exit 1
          fi
