name: Rewrite CI

on:
  workflow_dispatch:
  push:
    branches:
      - rewrite/v2
      - rewrite/v2-lane-*
  pull_request:
    branches:
      - rewrite/v2

permissions:
  contents: read

concurrency:
  group: rewrite-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: rewrite-workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:latest

  hygiene:
    name: rewrite-artifact-hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check workflow config and artifact hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".github/workflows" ]; then
            echo "::error::.github/workflows directory is missing"
            exit 1
          fi

          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if (( ${#workflow_files[@]} == 0 )); then
            echo "::error::No workflow files found under .github/workflows"
            exit 1
          fi

          tracked_artifacts="$(git ls-files -- .env build/.env)"
          if [ -n "$tracked_artifacts" ]; then
            echo "::error::Tracked environment artifacts found in git index:"
            echo "$tracked_artifacts"
            exit 1
          fi

          if [ ! -f ".env.example" ]; then
            echo "::error::Missing .env.example"
            exit 1
          fi

          if git check-ignore -v .github/workflows >/dev/null 2>&1; then
            echo "::error::.github/workflows is ignored by .gitignore"
            exit 1
          fi

          tracked_workflows="$(git ls-files -- .github/workflows)"
          if [ -z "$tracked_workflows" ]; then
            echo "::error::.github/workflows is not tracked in git index"
            exit 1
          fi

  v2-quality:
    name: rewrite-v2-quality
    runs-on: ubuntu-latest
    needs: workflow-lint
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install black ruff
      - name: Lint V2 sources and tests
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "src/dpost_v2" ]; then
            echo "::error::Missing src/dpost_v2"
            exit 1
          fi

          targets=(src/dpost_v2)
          if [ -d "tests/dpost_v2" ]; then
            targets+=(tests/dpost_v2)
          fi

          python -m ruff check "${targets[@]}"
          python -m black --check "${targets[@]}"

  v2-tests:
    name: rewrite-v2-tests
    runs-on: ubuntu-latest
    needs: v2-quality
    timeout-minutes: 30
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Run lightweight V2 tests
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "tests/dpost_v2" ]; then
            echo "::error::Missing tests/dpost_v2"
            exit 1
          fi

          python -m pytest -q tests/dpost_v2 --ignore tests/dpost_v2/smoke

  v2-integration:
    name: rewrite-v2-integration
    runs-on: ubuntu-latest
    needs: v2-tests
    if: github.ref == 'refs/heads/rewrite/v2' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 30
    env:
      DPOST_PC_NAME: tischrem_blb
      DPOST_DEVICE_PLUGINS: sem_phenomxl2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci,dev]"
      - name: Run V2 integration/smoke subset
        shell: bash
        run: |
          set -euo pipefail

          targets=(
            tests/dpost_v2/application/ingestion/test_pipeline_integration.py
            tests/dpost_v2/plugins/test_device_integration.py
            tests/dpost_v2/smoke
          )

          existing_targets=()
          for target in "${targets[@]}"; do
            if [ -e "$target" ]; then
              existing_targets+=("$target")
            fi
          done

          if (( ${#existing_targets[@]} == 0 )); then
            echo "::error::No V2 integration/smoke targets found under tests/dpost_v2"
            exit 1
          fi

          python -m pytest -q "${existing_targets[@]}"
