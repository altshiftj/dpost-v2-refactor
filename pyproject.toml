[project]
name = "ipat-watchdog"
version = "0.1.0"
description = "Scientific watchdog app for automated data ingestion"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "kadi-apy",
    "watchdog",
    "prometheus_client",
    "python-dotenv",
    "requests",
    "pywin32",
    "pywin32-ctypes",
    "PyYAML",
    "flask",
    "waitress",
]

[project.optional-dependencies]
ci     = ["pytest", "pyfakefs"]
build  = ["pyinstaller"]
dev    = ["black", "mypy", "ruff"]
sem_tischrem_blb = []
psa_horibalinks_blb = []
default_pc_blb = []
lab_workstation_blb = []

[project.entry-points."ipat_watchdog.device_plugins"]
sem_tischrem_blb = "ipat_watchdog.device_plugins.sem_tischrem_blb.plugin:TischREMPlugin"
psa_horibalinks_blb = "ipat_watchdog.device_plugins.psa_horibalinks_blb.plugin:HoribaLinksPlugin"

[project.entry-points."ipat_watchdog.pc_plugins"]
default_pc_blb = "ipat_watchdog.pc_plugins.default_pc_blb.plugin:DefaultPCPlugin"
lab_workstation_blb = "ipat_watchdog.pc_plugins.lab_workstation_blb.plugin:LabWorkstationPlugin"

[project.scripts]
ipat-watchdog = "ipat_watchdog.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["ipat_watchdog"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
