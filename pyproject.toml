[project]
name = "ipat-watchdog"
version = "0.1.0"
description = "Scientific watchdog app for automated data ingestion"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "kadi-apy",
    "watchdog",
    "prometheus_client",
    "python-dotenv",
    "requests",
    "pywin32",
    "pywin32-ctypes",
    "PyYAML",
    "flask",
    "waitress",
]

[project.optional-dependencies]
ci     = ["pytest", "pyfakefs"]
build  = ["pyinstaller"]
dev    = ["black", "mypy", "ruff"]
sem_phenomxl2 = []
psa_horibalinks_blb = []
utm_zwick = []
dsv_horiba = []
default_pc_blb = []

[project.entry-points."ipat_watchdog.device_plugins"]
sem_phenomxl2 = "ipat_watchdog.device_plugins.sem_phenomxl2.plugin:SEMPhenomXL2Plugin"
psa_horiba = "ipat_watchdog.device_plugins.psa_horiba.plugin:PSAHoribaPlugin"
utm_zwick = "ipat_watchdog.device_plugins.utm_zwick.plugin:UTMZwickPlugin"
dsv_horiba = "ipat_watchdog.device_plugins.dsv_horiba.plugin:DSVHoribaPlugin"

[project.entry-points."ipat_watchdog.pc_plugins"]
default_pc_blb = "ipat_watchdog.pc_plugins.default_pc_blb.plugin:DefaultPCPlugin"
tischrem_blb = "ipat_watchdog.pc_plugins.tischrem_blb.plugin:PCTischREMPlugin"
zwick_blb = "ipat_watchdog.pc_plugins.zwick_blb.plugin:PCZwickPlugin"
horiba_blb = "ipat_watchdog.pc_plugins.horiba_blb.plugin:PCHoribaPlugin"

[project.scripts]
ipat-watchdog = "ipat_watchdog.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["ipat_watchdog"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
