[project]
name = "ipat-watchdog"
version = "0.1.0"
description = "Scientific watchdog app for automated data ingestion"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "kadi-apy",
    "watchdog",
    "prometheus_client",
    "python-dotenv",
    "xmltodict",
    "tifffile",
    "requests",
    "rdflib",
    "pywin32",
    "pywin32-ctypes",
    "Pint",
    "PyYAML"
]

[project.optional-dependencies]
dev = [
    "black",
    "mypy",
    "ruff",
    "pytest",
    "pyinstaller",
    "pyfakefs",
    "jupyter",
    "ipython"
]

[project.scripts]
ipat-watchdog = "ipat_watchdog.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["ipat_watchdog"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
